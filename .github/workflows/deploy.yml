name: Deploy to Xserver

# main への push で本番（Xserver public_html）へ自動デプロイ。
# 手動実行も可能（Actions タブ → Run workflow）。
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 同時実行を防ぐ（前のデプロイが走っていたら中断して最新だけ反映）
concurrency:
  group: deploy-xserver-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Xserver (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # 接続情報は必ず GitHub Secrets から。リポジトリに直書きしないこと。
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps          # 暗号化FTP（explicit FTPS / ポート21）
          port: 21

          # アップロード元（リポジトリ直下）と、Xserverの公開ディレクトリ
          local-dir: ./
          # ↓ FTPログイン直下からのパス。末尾スラッシュ必須。
          #   Xserverの主FTPアカウントは「ログイン直下 → hanasatomi.com/ → public_html/」構造
          #   （ファイルマネージャのツリーと同じ）。実パスは FileZilla で1度確認し、
          #   もしログイン直後がすでにドメイン配下なら ./public_html/ に変更すること。
          server-dir: ./hanasatomi.com/public_html/

          # ▼ 削除の扱い（重要）
          #   dangerous-clean-slate は使わない。差分同期の状態ファイルで、
          #   「このActionが過去に上げたファイル」だけを対象に、消えたものを削除する。
          #   → Xserverの .htaccess / .user.ini / .well-known/（SSL認証等）は
          #     Actionが上げていないので削除されない。さらに exclude にも明記して二重に保護する。

          # 公開サイトに不要なもの・機密は上げない（内容は .deployignore と同期すること）
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            .claude/**
            tasks/**
            backup/**
            メモ/**
            **/*.zip
            **/*.xlsx
            **/*.docx
            **/*.pdf
            **/._*
            **/.DS_Store
            .gitignore
            .deployignore
            CLAUDE.md
            DESIGN.md
            README.md
            .htaccess
            .user.ini
            .well-known/**
            assets/images/ogp.svg
            assets/images/icon-master.svg
